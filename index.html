<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini E-Commerce Shop</title>
    <link rel="stylesheet" href="style.css">

    <!-- font-awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <!-- Header Section  -->
    <header class="main-header">

        <!-- logo on left side  -->
        <div class="logo">
            <a href="">
                <img src="./images/everluma-logo.png" alt="Everluma Logo">
            </a>
        </div>


        <!-- search-bar in middle  -->
         <div class="search-container">
            <input type="text" placeholder="Search your product">
            <button><i class="fa-solid fa-magnifying-glass"></i> Search</button>
         </div>

       <!-- Shopping Cart on Right side  -->
        <div class="header-icon">
            <div class="cart-icon">
                <i class="fa-solid fa-cart-arrow-down"></i>
                <span class="cart-count">0</span>
            </div>

        </div>
    </header>

    <!-- main section  -->
     <main>
        <!-- api theke data ekhane load hobe  -->
        <div id="product-grid" class="product-grid">

          
        </div>

    </main>

<!-- Footer Section  -->
<footer class="everluma-footer">
    <div class="footer-container">
        <!-- brand section -->
        <div class="footer-box">
            <h2 class="footer-logo">EVER<span>LUMA</span></h2>
            <p>Defining elegance and trust in every purchase.</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-linkedin"></i></a>
            </div>
        </div>

        <!-- quick links -->
        <div class="footer-box">
            <h3>Quick Links</h3>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>

        <!-- support -->
        <div class="footer-box">
            <h3>Support</h3>
            <ul>
                <li><a href="#">Track Order</a></li>
                <li><a href="#">Privacy Policy</a></li>
                <li><a href="#">Terms & Conditions</a></li>
            </ul>
        </div>

        <!-- newsletter -->
        <div class="footer-box newsletter">
            <h3>Stay Updated</h3>
            <div class="subscribe-box">
                <input type="email" placeholder="Write your email...">
                <button>Subscribe</button>
            </div>
        </div>
    </div>
    <div class="footer-bottom">
        <p>&copy; 2026 Everluma. All Rights Reserved. | Designed by Farjana Aktar Monisha</p>
    </div>
</footer>



    <script src="./index.js"></script>
</body>
</html>
